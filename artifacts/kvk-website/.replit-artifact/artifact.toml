kind = "web"
previewPath = "/"
title = "KVK Technologies"
version = "1.0.0"
id = "artifacts/kvk-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24064

[services.development]
run = "pnpm --filter @workspace/kvk-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kvk-website", "run", "build" ]
publicDir = "artifacts/kvk-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24064"
BASE_PATH = "/"
